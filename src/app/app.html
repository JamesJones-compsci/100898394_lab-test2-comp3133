<!-- app.html -->

<!-- Material Toolbar -->
<mat-toolbar color="primary">
  <span>{{ title() }}</span> <!-- Display your app title using the signal -->
  
  <!-- Navigation links -->
  <span class="spacer"></span>
  <a mat-button routerLink="/characters" routerLinkActive="active-link">Character List</a>
  <!-- Example static link to a character details page with id=1 -->
  <a mat-button routerLink="/character/1" routerLinkActive="active-link">Character Details</a>
</mat-toolbar>

<!-- Router outlet -->
<div class="main-content">
  <router-outlet></router-outlet>
</div>
